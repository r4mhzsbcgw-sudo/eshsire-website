name: Daily SEO Articles

on:
  schedule:
    # China Standard Time (UTC+8): 09:00 — 1 English article per day
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      day:
        description: "Force calendar day 1-90 (optional)"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate English SEO article (strict validation)
        run: |
          DAY="${{ github.event.inputs.day }}"
          EXTRA=""
          if [ -n "$DAY" ]; then EXTRA="--day $DAY"; fi
          node scripts/generate-daily-seo-articles.mjs morning $EXTRA

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Production build
        run: npm run build

      - name: Audit blog images
        run: node scripts/seo/audit-blog-images.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/image-library.json content/image-used.json content/eshsire-90-day-calendar.json daily-report.md src/content/blog/generated/ src/content/blog/slugs.ts src/content/blog/generated/registry.ts scripts/generate-sitemap.mjs public/sitemap.xml
          if git diff --staged --quiet; then
            echo "No new articles to publish"
            exit 0
          fi
          git commit -m "Eshsire Group daily EN blog publish ($(date +%Y-%m-%d))"
          git push
