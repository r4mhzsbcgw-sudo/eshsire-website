name: Daily SEO Articles

on:
  schedule:
    # China Standard Time (UTC+8): 09:00, 14:00, 19:00
    - cron: "0 1 * * *"
    - cron: "0 6 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Article slot (morning, afternoon, evening, or all)"
        required: false
        default: "all"
      day:
        description: "Force calendar day 1-90 (optional)"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine slot from cron
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.slot }}"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              echo "mode=all" >> $GITHUB_OUTPUT
            else
              echo "mode=$INPUT" >> $GITHUB_OUTPUT
            fi
            DAY="${{ github.event.inputs.day }}"
            if [ -n "$DAY" ]; then
              echo "day=$DAY" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "mode=afternoon" >> $GITHUB_OUTPUT
          else
            echo "mode=evening" >> $GITHUB_OUTPUT
          fi

      - name: Generate SEO article(s)
        run: |
          MODE="${{ steps.slot.outputs.mode }}"
          DAY="${{ steps.slot.outputs.day }}"
          EXTRA=""
          if [ -n "$DAY" ]; then EXTRA="--day $DAY"; fi
          if [ "$MODE" = "all" ]; then
            node scripts/generate-daily-seo-articles.mjs $EXTRA
          else
            node scripts/generate-daily-seo-articles.mjs "$MODE" $EXTRA
          fi

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Audit blog images
        run: |
          node scripts/seo/download-blog-editorial-images.mjs
          node scripts/seo/audit-blog-images.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/image-library.json content/image-used.json content/bjfloor-90-day-calendar.json daily-report.md src/content/blog/generated/ src/content/blog/slugs.ts src/content/blog/generated/registry.ts scripts/generate-sitemap.mjs public/sitemap.xml
          if git diff --staged --quiet; then
            echo "No new articles to publish"
            exit 0
          fi
          git commit -m "BJFLOOR daily SEO publish ($(date +%Y-%m-%d))"
          git push
